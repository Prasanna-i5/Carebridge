<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Join Us – Sharing Life’s Essentials</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: #fdfbd3;
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }
      .container {
        max-width: 480px;
        margin: 5vw auto;
        background: #fafada;
        border-radius: 1.2em;
        box-shadow: 0 6px 24px rgba(24, 2, 2, 0.06);
        padding: 2em 2em 1.5em 2em;
        animation: fadeInUp 1s ease;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(35px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      h2 {
        text-align: center;
        color: #54540d;
        font-size: 2em;
        margin-bottom: 0.4em;
      }
      .header-img {
        width: 100%;
        margin-bottom: 10px;
        border-radius: 0.7em;
        box-shadow: 0 2px 12px rgba(97, 54, 89, 0.07);
        animation: pulse 2s infinite alternate;
      }
      @keyframes pulse {
        to {
          box-shadow: 0 2px 24px rgba(20, 9, 2, 0.18);
        }
      }
      form label {
        font-weight: 500;
        color: #0b0501;
        display: block;
        margin: 1em 0 0.25em 0;
      }
      form input,
      form textarea,
      form select {
        width: 100%;
        padding: 0.7em;
        border-radius: 0.4em;
        border: 1px solid #ead8b5;
        font-size: 1em;
        transition: border 0.2s;
      }
      form input:focus,
      form textarea:focus,
      form select:focus {
        border: 1.5px solid #10010d;
      }
      button {
        background: linear-gradient(90deg, #0e0701 0, #bdb96a 100%);
        color: #fff;
        border: none;
        padding: 0.8em 2em;
        border-radius: 0.5em;
        font-size: 1.05em;
        cursor: pointer;
        margin-top: 1.2em;
        display: block;
        width: 100%;
        box-shadow: 0 3px 12px rgba(0, 0, 0, 0.08);
        transition: background 0.2s;
        animation: bounceIn 1.2s 0.2s;
      }
      button:hover {
        background: linear-gradient(90deg, #bdb96a 0, #000000 100%);
      }
      @keyframes bounceIn {
        0% {
          transform: scale(0.85);
        }
        60% {
          transform: scale(1.08);
        }
        80% {
          transform: scale(0.98);
        }
        100% {
          transform: scale(1);
        }
      }
      .caption {
        text-align: center;
        color: #000000;
        font-size: 1em;
      }
    </style>
  </head>
  <header>
    <span class="logo">Carebridge</span>
    <nav>
      <a href="index.html">Home</a>
      <a href="how-it-works.html" aria-current="page">How It Works</a>
      <a href="Donate.html">Donate</a>
      <a href="payment.html">Payment</a>
      <a href="impact.html">Impact</a>
      <!--<a href="logistics.html">Logistics</a>-->
      <a href="join-us.html">Join Us</a>
    </nav>
  </header>
  <body>
    <div class="container">
      <img
        src="img/volunteer.jpg"
        alt="Volunteers helping"
        class="header-img"
      />
      <h2>Join as a Volunteer</h2>
      <p class="caption">
        Help share essentials, inspire hope, connect hearts!
      </p>
      <form>
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" required />

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required />

        <label for="phone">Phone Number</label>
        <input
          type="tel"
          id="phone"
          name="phone"
          required
          placeholder="eg. 9876543210"
        />

        <label for="city">City</label>
        <input type="text" id="city" name="city" />

        <label for="role">Interested Role</label>
        <select id="role" name="role" required>
          <option value="">Select an option</option>
          <option value="donation-coordinator">Donation Coordinator</option>
          <option value="logistics">Logistics</option>
          <option value="community-manager">Community Manager</option>
          <option value="field-volunteer">Field Volunteer</option>
          <option value="other">Other</option>
        </select>

        <label for="reason">Why do you want to join?</label>
        <textarea
          id="reason"
          name="reason"
          rows="3"
          required
          placeholder="Share your reason..."
        ></textarea>

        <button type="submit">Apply Now</button>
      </form>
    </div>
    <footer>
      &copy; 2025 Carebridge | <a href="#">Privacy Policy</a> |
      <a href="#">Terms of Service</a> | <a href="#">Contact</a>
    </footer>
  </body>
</html>
